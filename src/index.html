<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pokedex Challenge | int</title>

    <link rel="icon" type="image/png" href="favicon.png" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Estilos específicos para os Cards da Pokedex (Componente 1) */
      .pokemon-card {
        border: 1px solid #eee;
        border-radius: 12px;
        background-color: white;
        transition: 0.3s;
        overflow: hidden;
      }
      .pokemon-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }
      .stat-bar {
        background-color: #eee;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
      }
      .stat-fill {
        background-color: #4dabff;
        height: 100%;
        transition: width 0.5s ease-out;
      }
      .pokemon-type {
        padding: 3px 10px;
        border-radius: 5px;
        color: white;
        font-size: 0.75rem;
        text-transform: uppercase;
        font-weight: bold;
        margin-right: 5px;
      }

      /* Cores dos Tipos Oficiais (Componente 1) */
      .bg-grass {
        background-color: #78c850;
      }
      .bg-fire {
        background-color: #f08030;
      }
      .bg-water {
        background-color: #6890f0;
      }
      .bg-poison {
        background-color: #a040a0;
      }
      .bg-electric {
        background-color: #f8d030;
      }
      .bg-bug {
        background-color: #a8b820;
      }
      .bg-normal {
        background-color: #a8a878;
      }
      .bg-flying {
        background-color: #a890f0;
      }
      .bg-fairy {
        background-color: #ee99ac;
      }
      .bg-default {
        background-color: #a8a878;
      }
    </style>
  </head>
  <body class="bg-light">
    <header class="bg-dark text-white text-center py-3 mb-4">
      <h1>Pokedex</h1>
    </header>

    <main class="container">
      <section class="row g-3 mb-5 align-items-end justify-content-center">
        <div class="col-12 col-md-5">
          <label for="pokemonInput" class="form-label fw-bold"
            >Name or ID:</label
          >
          <input
            type="text"
            id="pokemonInput"
            class="form-control"
            placeholder="Ex: Pikachu ou 25"
          />
        </div>

        <div class="col-6 col-md-3">
          <label for="type-filter" class="form-label fw-bold">Type:</label>
          <select id="type-filter" class="form-select">
            <option value="all">All</option>
            <option value="grass">Grass</option>
            <option value="fire">Fire</option>
            <option value="water">Water</option>
            <option value="electric">Electric</option>
            <option value="poison">Poison</option>
            <option value="bug">Bug</option>
            <option value="normal">Normal</option>
          </select>
        </div>

        <div class="col-6 col-md-2">
          <label for="sort-order" class="form-label fw-bold">Sort:</label>
          <select id="sort-order" class="form-select">
            <option value="id">Number (ID)</option>
            <option value="A-Z">A-Z</option>
            <option value="Z-A">Z-A</option>
          </select>
        </div>

        <div class="col-12 col-md-2 text-center text-md-start">
          <button
            onclick="fazerRequisicao()"
            class="btn btn-primary w-100 fw-bold"
          >
            Buscar
          </button>
        </div>
      </section>

      <div
        id="pokedex-container"
        class="pokedex row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5"
      >
        <div class="col-12 text-center text-muted">
          Digite um nome ou ID e clique em Buscar...
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
